name: frontendBuild

on:
  workflow_run:
    workflows: ["Frontend Tests"]
    types: [completed]
    branches: [devel, testing, stable]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Only run if the triggering workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.GH_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      # Generate version information
      - name: Get branch name
        id: get_branch
        run: echo "branch=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_OUTPUT

      - name: Create version file
        id: create_version
        run: |
          BUILD_NUM=${{ github.run_number }}
          BRANCH=${{ steps.get_branch.outputs.branch }}
          VERSION="V5.0-${BUILD_NUM}-${BRANCH}"
          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          # Generate version.js file with actual values
          sed -i "s/__APP_VERSION__/${VERSION}/g" src/version.js
          sed -i "s/__APP_BRANCH__/${BRANCH}/g" src/version.js
          sed -i "s/__BUILD_NUMBER__/${BUILD_NUM}/g" src/version.js
          sed -i "s/__BUILD_DATE__/${BUILD_DATE}/g" src/version.js

          # Save version to GITHUB_OUTPUT for later steps
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build_date=${BUILD_DATE}" >> $GITHUB_OUTPUT

      - name: Build Quasar App
        run: npx quasar build

      # Rest of your workflow remains the same
      #- name: Run minifyFontnames.sh
      #  run: ./minifyFontnames.sh

      - name: Run gzipSPA.sh
        run: ./gzipSPA.sh

      - name: Generate icon list
        run: node generate_icon_list.js > ./fileList.h

      # Replace git describe with our consistent version
      - name: Create VERSION file
        run: |
          VERSION="${{ steps.create_version.outputs.version }}"
          echo "${VERSION}" > dist/spa/VERSION

      - name: Upload SPA files to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: spa-files
          path: dist/spa/

      - name: Upload fileList.h to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: fileList.h
          path: ./fileList.h

      - name: Create download page
        run: |
          BRANCH=${{ steps.get_branch.outputs.branch }}
          mkdir -p gh-pages-content
          VERSION="${{ steps.create_version.outputs.version }}"
          BUILD_DATE=$(date)
          echo "<html><body><h1>Download Artifacts - ${BRANCH}</h1><ul>" > gh-pages-content/index.html
          echo "<p>Branch: ${BRANCH}</p>" >> gh-pages-content/index.html
          echo "<p>Build Date: ${BUILD_DATE}</p>" >> gh-pages-content/index.html
          echo "<p>Version: ${VERSION}</p>" >> gh-pages-content/index.html
          echo "<li><a href='spa-files.zip'>Download SPA Files</a></li>" >> gh-pages-content/index.html
          echo "<li><a href='fileList.h'>Download fileList.h</a></li>" >> gh-pages-content/index.html
          echo "</ul>" >> gh-pages-content/index.html
          echo "</body></html>" >> gh-pages-content/index.html

      - name: Copy SPA files to download directory
        run: |
          zip -r gh-pages-content/spa-files.zip dist/spa/*

      - name: Copy fileList.h to download directory
        run: |
          cp ./fileList.h gh-pages-content/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAT }}
          publish_dir: ./gh-pages-content
          publish_branch: gh-pages
          keep_files: true
          destination_dir: ${{ steps.get_branch.outputs.branch }}

      - name: Wait for GitHub Pages artifacts to be accessible
        run: |
          WEBAPP_BRANCH="${{ steps.get_branch.outputs.branch }}"
          BASE_URL="https://pljakobs.github.io/esp_rgb_webapp2/${WEBAPP_BRANCH}"
          MAX_ATTEMPTS=10
          DELAY=15

          for file in fileList.h spa-files.zip; do
            echo "Polling ${BASE_URL}/${file} ..."
            for i in $(seq 1 $MAX_ATTEMPTS); do
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" -L "${BASE_URL}/${file}")
              if [ "$HTTP" = "200" ]; then
                echo "  ✓ ${file} accessible (attempt ${i})"
                break
              fi
              echo "  attempt ${i}/${MAX_ATTEMPTS}: HTTP ${HTTP} — waiting ${DELAY}s"
              if [ "$i" = "$MAX_ATTEMPTS" ]; then
                echo "ERROR: ${file} not accessible after $((MAX_ATTEMPTS * DELAY))s"
                exit 1
              fi
              sleep $DELAY
            done
          done

          echo "All artifacts verified and accessible!"

      - name: Trigger firmware build
        # Requires secrets.GH_PAT with scopes: repo (or public_repo) + workflow
        # on the pljakobs/esp_rgbww_firmware repository.
        run: |
          WEBAPP_BRANCH="${{ steps.get_branch.outputs.branch }}"
          case "$WEBAPP_BRANCH" in
            "devel") FIRMWARE_BRANCH="develop" ;;
            *)       FIRMWARE_BRANCH="$WEBAPP_BRANCH" ;;
          esac

          echo "Triggering firmware build: firmware=${FIRMWARE_BRANCH} webapp=${WEBAPP_BRANCH}"

          HTTP_CODE=$(curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            -w "\n%{http_code}" \
            -o /tmp/dispatch_response.json \
            https://api.github.com/repos/pljakobs/esp_rgbww_firmware/dispatches \
            -d "$(jq -nc \
              --arg et frontend-build-completed \
              --arg br "$FIRMWARE_BRANCH" \
              --arg wb "$WEBAPP_BRANCH" \
              --arg ri "${{ github.run_id }}" \
              '{event_type:$et,client_payload:{branch:$br,webapp_branch:$wb,run_id:$ri}}')" \
            | tail -1)

          echo "HTTP status: $HTTP_CODE"
          if [ -s /tmp/dispatch_response.json ]; then
            cat /tmp/dispatch_response.json
          fi

          if [ "$HTTP_CODE" -ne "204" ]; then
            echo "ERROR: dispatch failed (HTTP $HTTP_CODE). Verify GH_PAT has repo+workflow scope on esp_rgbww_firmware."
            exit 1
          fi

          echo "✓ Firmware build triggered"
